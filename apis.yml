apis:
  - aid: farmos:farmos-api
    name: farmOS JSON:API
    description: The farmOS JSON:API provides access to farm assets, logs, plans,
      and records. Follows the JSON:API specification with UUID-based resource identifiers.
      The root endpoint at /api returns server metadata and available resource types.
      Resource endpoints follow the pattern /api/[entity-type]/[bundle].
    humanURL: https://farmos.org/development/api/
    baseURL: https://{farmOS-host}/api
