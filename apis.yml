aid: farmos
name: farmOS
description: Open-source farm management and record-keeping system with a JSON:API-based
  REST API for managing assets, logs, plans, and farm records. Supports self-hosted
  deployments and managed hosting via Farmier. Authentication uses OAuth2 with Authorization
  Code, Password Credentials, and Client Credentials grant types.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
