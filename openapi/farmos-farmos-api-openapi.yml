  /taxonomy_term/unit:
    get:
      operationId: listUnits
      summary: List unit taxonomy terms
      tags: [Taxonomy]
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageOffset'
      responses:
        '200':
          description: A collection of unit taxonomy terms
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/TaxonomyCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── QUANTITY ENDPOINTS ─────────────────────────────────────────────────────

  /quantity/standard:
    get:
      operationId: listStandardQuantities
      summary: List standard quantities
      description: Measurement quantities associated with logs.
      tags: [Quantities]
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageOffset'
        - $ref: '#/components/parameters/FilterField'
        - $ref: '#/components/parameters/SortField'
        - $ref: '#/components/parameters/IncludeRelated'
      responses:
        '200':
          description: A collection of standard quantities
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/QuantityCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createStandardQuantity
      summary: Create a standard quantity
      tags: [Quantities]
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: '#/components/schemas/QuantityRequest'
      responses:
        '201':
          description: Standard quantity created
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/QuantityResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /quantity/standard/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: getStandardQuantity
      summary: Get a standard quantity
      tags: [Quantities]
      responses:
        '200':
          description: A standard quantity
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/QuantityResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateStandardQuantity
      summary: Update a standard quantity
      tags: [Quantities]
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: '#/components/schemas/QuantityRequest'
      responses:
        '200':
          description: Updated standard quantity
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/QuantityResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteStandardQuantity
      summary: Delete a standard quantity
      tags: [Quantities]
      responses:
        '204':
          description: Standard quantity deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

# ── COMPONENTS ────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    oauth2AuthorizationCode:
      type: oauth2
      description: |
        OAuth2 Authorization Code grant for third-party integrations. Users
        authorize the client application to access their farmOS data.
      flows:
        authorizationCode:
          authorizationUrl: /oauth/authorize
          tokenUrl: /oauth/token
          scopes:
            farm_manager: Full management access to the farm
            farm_worker: Worker-level access to farm records
            farm_viewer: Read-only access to farm records
    oauth2ClientCredentials:
      type: oauth2
      description: |
        OAuth2 Client Credentials grant for machine-to-machine authentication.
        Used when no user account is required.
      flows:
        clientCredentials:
          tokenUrl: /oauth/token
          scopes:
            farm_manager: Full management access to the farm
            farm_worker: Worker-level access to farm records
            farm_viewer: Read-only access to farm records

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      description: UUID of the resource
      schema:
        type: string
        format: uuid
      example: '3f1c2b4a-5d6e-7890-abcd-ef1234567890'

    PageSize:
      name: page[limit]
      in: query
      description: Number of results per page
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 50

    PageOffset:
      name: page[offset]
      in: query
      description: Offset for pagination
      schema:
        type: integer
        minimum: 0
        default: 0

    FilterField:
      name: filter[field]
      in: query
      description: |
        JSON:API filter parameter. Use dot notation for nested fields.
        Example: filter[status]=pending or filter[timestamp][value]=1234567890&filter[timestamp][operator]=>=
      schema:
        type: string

    SortField:
      name: sort
      in: query
      description: |
        Comma-separated list of fields to sort by. Prefix with - for descending.
        Example: sort=-timestamp,name
      schema:
        type: string

    IncludeRelated:
      name: include
      in: query
      description: |
        Comma-separated list of related resources to include in the response.
        Example: include=asset,quantity
      schema:
        type: string

  schemas:
    ServerInfo:
      type: object
      description: farmOS server metadata
      properties:
        meta:
          type: object
          properties:
            links:
              type: object
              description: Available resource type endpoints
              additionalProperties:
                type: object
                properties:
                  href:
                    type: string
                    format: uri
            farm:
              type: object
              description: Farm details
              properties:
                name:
                  type: string
                  description: Farm name
                url:
                  type: string
                  format: uri
                  description: Farm URL
                version:
                  type: string
                  description: farmOS version string
                system_of_measurement:
                  type: string
                  enum: [metric, us]
                  description: Measurement system
            user:
              type: object
              description: Authenticated user details
              properties:
                id:
                  type: string
                  format: uuid
                type:
                  type: string

    JsonApiLinks:
      type: object
      properties:
        self:
          type: string
          format: uri
        related:
          type: string
          format: uri

    JsonApiRelationshipData:
      type: object
      properties:
        type:
          type: string
        id:
          type: string
          format: uuid

    JsonApiRelationship:
      type: object
      properties:
        data:
          oneOf:
            - $ref: '#/components/schemas/JsonApiRelationshipData'
            - type: array
              items:
                $ref: '#/components/schemas/JsonApiRelationshipData'
            - nullable: true
              type: object
              maxProperties: 0
        links:
          $ref: '#/components/schemas/JsonApiLinks'

    AssetAttributes:
      type: object
      description: Common attributes shared by all asset types
      properties:
        drupal_internal__id:
          type: integer
          readOnly: true
          description: Internal Drupal integer ID (not for external use)
        name:
          type: string
          description: Asset name
        status:
          type: string
          enum: [active, archived]
          description: Asset status (use archived to retire an asset)
        archived:
          type: boolean
          description: Whether the asset is archived (4.x and later)
        notes:
          type: object
          description: Free-form notes (rich text)
          properties:
            value:
              type: string
            format:
              type: string
        is_location:
          type: boolean
          description: Whether this asset can act as a location for other assets/logs
        is_fixed:
          type: boolean
          description: Whether the asset has a fixed geometry (does not move)
        intrinsic_geometry:
          type: string
          description: WKT geometry string for fixed-location assets
        geometry:
          type: string
          description: Computed current geometry (WKT)
        location:
          type: array
          description: Computed current location assets
          items:
            type: object
        nickname:
          type: array
          description: Alternative names/nicknames for the asset
          items:
            type: string
        id_tag:
          type: array
          description: Physical identification tags
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
              location:
                type: string
        image:
          type: array
          description: Attached images
          items:
            type: object
        file:
          type: array
          description: Attached files
          items:
            type: object
        created:
          type: integer
          description: Unix timestamp when the record was created
          readOnly: true
        changed:
          type: integer
          description: Unix timestamp when the record was last modified
          readOnly: true

    AssetRelationships:
      type: object
      description: Common relationships shared by all asset types
      properties:
        parent:
          $ref: '#/components/schemas/JsonApiRelationship'
        location:
          $ref: '#/components/schemas/JsonApiRelationship'
        image:
          $ref: '#/components/schemas/JsonApiRelationship'
        file:
          $ref: '#/components/schemas/JsonApiRelationship'

    AssetData:
      type: object
      required:
        - type
        - attributes
      properties:
        type:
          type: string
          description: JSON:API resource type (e.g., asset--animal, asset--land)
          example: asset--animal
        id:
          type: string
          format: uuid
          readOnly: true
        attributes:
          $ref: '#/components/schemas/AssetAttributes'
        relationships:
          $ref: '#/components/schemas/AssetRelationships'
        links:
          $ref: '#/components/schemas/JsonApiLinks'

    AssetRequest:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/AssetData'

    AssetResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/AssetData'
        included:
          type: array
          items:
            type: object
        links:
          $ref: '#/components/schemas/JsonApiLinks'

    AssetCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AssetData'
        included:
          type: array
          items:
            type: object
        links:
          type: object
          properties:
            self:
              type: string
              format: uri
            next:
              type: string
              format: uri
            prev:
              type: string
              format: uri
        meta:
          type: object
          properties:
            count:
              type: integer
              description: Total number of matching resources

    LogAttributes:
      type: object
      description: Common attributes shared by all log types
      properties:
        drupal_internal__id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Log name/title
        timestamp:
          type: integer
          description: Unix timestamp of the log event
        status:
          type: string
          enum: [pending, done, abandoned]
          description: Log completion status
        notes:
          type: object
          description: Free-form notes (rich text)
          properties:
            value:
              type: string
            format:
              type: string
        geometry:
          type: string
          description: WKT geometry associated with this log
        is_movement:
          type: boolean
          description: Whether this log records asset movement to a new location
        image:
          type: array
          items:
            type: object
        file:
          type: array
          items:
            type: object
        created:
          type: integer
          readOnly: true
        changed:
          type: integer
          readOnly: true

    LogRelationships:
      type: object
      description: Common relationships shared by all log types
      properties:
        asset:
          $ref: '#/components/schemas/JsonApiRelationship'
        location:
          $ref: '#/components/schemas/JsonApiRelationship'
        category:
          $ref: '#/components/schemas/JsonApiRelationship'
        owner:
          $ref: '#/components/schemas/JsonApiRelationship'
        quantity:
          $ref: '#/components/schemas/JsonApiRelationship'
        image:
          $ref: '#/components/schemas/JsonApiRelationship'
        file:
          $ref: '#/components/schemas/JsonApiRelationship'

    LogData:
      type: object
      required:
        - type
        - attributes
      properties:
        type:
          type: string
          description: JSON:API resource type (e.g., log--activity, log--harvest)
          example: log--activity
        id:
          type: string
          format: uuid
          readOnly: true
        attributes:
          $ref: '#/components/schemas/LogAttributes'
        relationships:
          $ref: '#/components/schemas/LogRelationships'
        links:
          $ref: '#/components/schemas/JsonApiLinks'

    LogRequest:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LogData'

    LogResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/LogData'
        included:
          type: array
          items:
            type: object
        links:
          $ref: '#/components/schemas/JsonApiLinks'

    LogCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LogData'
        included:
          type: array
          items:
            type: object
        links:
          type: object
          properties:
            self:
              type: string
              format: uri
            next:
              type: string
              format: uri
            prev:
              type: string
              format: uri
        meta:
          type: object
          properties:
            count:
              type: integer

    PlanAttributes:
      type: object
      properties:
        name:
          type: string
          description: Plan name
        status:
          type: string
          enum: [active, archived]
        notes:
          type: object
          properties:
            value:
              type: string
            format:
              type: string
        created:
          type: integer
          readOnly: true
        changed:
          type: integer
          readOnly: true

    PlanData:
      type: object
      required:
        - type
        - attributes
      properties:
        type:
          type: string
          example: plan--plan
        id:
          type: string
          format: uuid
          readOnly: true
        attributes:
          $ref: '#/components/schemas/PlanAttributes'
        links:
          $ref: '#/components/schemas/JsonApiLinks'

    PlanRequest:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/PlanData'

    PlanResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PlanData'
        links:
          $ref: '#/components/schemas/JsonApiLinks'

    PlanCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PlanData'
        links:
          type: object
        meta:
          type: object
          properties:
            count:
              type: integer

    TaxonomyTermAttributes:
      type: object
      properties:
        name:
          type: string
          description: Taxonomy term name
        description:
          type: object
          properties:
            value:
              type: string
            format:
              type: string
        weight:
          type: integer
        drupal_internal__tid:
          type: integer
          readOnly: true

    TaxonomyTermData:
      type: object
      properties:
        type:
          type: string
          description: JSON:API resource type (e.g., taxonomy_term--plant_type)
        id:
          type: string
          format: uuid
          readOnly: true
        attributes:
          $ref: '#/components/schemas/TaxonomyTermAttributes'
        links:
          $ref: '#/components/schemas/JsonApiLinks'

    TaxonomyCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TaxonomyTermData'
        links:
          type: object
        meta:
          type: object
          properties:
            count:
              type: integer

    QuantityAttributes:
      type: object
      properties:
        measure:
          type: string
          description: Type of measurement (e.g., weight, volume, count, length, area, time, temperature, pressure, water_content, rating, ratio)
          enum: [weight, volume, count, length, area, time, temperature, pressure, water_content, rating, ratio]
        value:
          type: object
          description: Numeric value with decimal precision
          properties:
            numerator:
              type: integer
            denominator:
              type: integer
            decimal:
              type: string
        label:
          type: string
          description: Optional label for the quantity
        inventory_adjustment:
          type: string
          description: How this quantity affects inventory (increment or decrement)
          enum: [increment, decrement, reset]

    QuantityRelationships:
      type: object
      properties:
        units:
          $ref: '#/components/schemas/JsonApiRelationship'
        inventory_asset:
          $ref: '#/components/schemas/JsonApiRelationship'

    QuantityData:
      type: object
      required:
        - type
        - attributes
      properties:
        type:
          type: string
          example: quantity--standard
        id:
          type: string
          format: uuid
          readOnly: true
        attributes:
          $ref: '#/components/schemas/QuantityAttributes'
        relationships:
          $ref: '#/components/schemas/QuantityRelationships'
        links:
          $ref: '#/components/schemas/JsonApiLinks'

    QuantityRequest:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/QuantityData'

    QuantityResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/QuantityData'
        links:
          $ref: '#/components/schemas/JsonApiLinks'

    QuantityCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/QuantityData'
        links:
          type: object
        meta:
          type: object
          properties:
            count:
              type: integer

    JsonApiError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
              title:
                type: string
              detail:
                type: string
              source:
                type: object
                properties:
                  pointer:
                    type: string

  responses:
    Unauthorized:
      description: Authentication required or token expired
      content:
        application/vnd.api+json:
          schema:
            $ref: '#/components/schemas/JsonApiError'

    NotFound:
      description: Resource not found
      content:
        application/vnd.api+json:
          schema:
            $ref: '#/components/schemas/JsonApiError'

    UnprocessableEntity:
      description: Validation error
      content:
        application/vnd.api+json:
          schema:
            $ref: '#/components/schemas/JsonApiError'
