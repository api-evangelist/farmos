components:
  schemas:
    AssetRequest:
      type: object
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/AssetData'
    JsonApiError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
              title:
                type: string
              detail:
                type: string
              source:
                type: object
                properties:
                  pointer:
                    type: string
    AssetCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AssetData'
        included:
          type: array
          items:
            type: object
        links:
          type: object
          properties:
            self:
              type: string
              format: uri
            next:
              type: string
              format: uri
            prev:
              type: string
              format: uri
        meta:
          type: object
          properties:
            count:
              type: integer
              description: Total number of matching resources
    JsonApiRelationship:
      type: object
      properties:
        data:
          oneOf:
          - $ref: '#/components/schemas/JsonApiRelationshipData'
          - type: array
            items:
              $ref: '#/components/schemas/JsonApiRelationshipData'
          - nullable: true
            type: object
            maxProperties: 0
        links:
          $ref: '#/components/schemas/JsonApiLinks'
    AssetRelationships:
      type: object
      description: Common relationships shared by all asset types
      properties:
        parent:
          $ref: '#/components/schemas/JsonApiRelationship'
        location:
          $ref: '#/components/schemas/JsonApiRelationship'
        image:
          $ref: '#/components/schemas/JsonApiRelationship'
        file:
          $ref: '#/components/schemas/JsonApiRelationship'
    AssetData:
      type: object
      required:
      - type
      - attributes
      properties:
        type:
          type: string
          description: JSON:API resource type (e.g., asset--animal, asset--land)
          example: asset--animal
        id:
          type: string
          format: uuid
          readOnly: true
        attributes:
          $ref: '#/components/schemas/AssetAttributes'
        relationships:
          $ref: '#/components/schemas/AssetRelationships'
        links:
          $ref: '#/components/schemas/JsonApiLinks'
    JsonApiLinks:
      type: object
      properties:
        self:
          type: string
          format: uri
        related:
          type: string
          format: uri
    JsonApiRelationshipData:
      type: object
      properties:
        type:
          type: string
        id:
          type: string
          format: uuid
    AssetResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/AssetData'
        included:
          type: array
          items:
            type: object
        links:
          $ref: '#/components/schemas/JsonApiLinks'
    AssetAttributes:
      type: object
      description: Common attributes shared by all asset types
      properties:
        drupal_internal__id:
          type: integer
          readOnly: true
          description: Internal Drupal integer ID (not for external use)
        name:
          type: string
          description: Asset name
        status:
          type: string
          enum:
          - active
          - archived
          description: Asset status (use archived to retire an asset)
        archived:
          type: boolean
          description: Whether the asset is archived (4.x and later)
        notes:
          type: object
          description: Free-form notes (rich text)
          properties:
            value:
              type: string
            format:
              type: string
        is_location:
          type: boolean
          description: Whether this asset can act as a location for other assets/logs
        is_fixed:
          type: boolean
          description: Whether the asset has a fixed geometry (does not move)
        intrinsic_geometry:
          type: string
          description: WKT geometry string for fixed-location assets
        geometry:
          type: string
          description: Computed current geometry (WKT)
        location:
          type: array
          description: Computed current location assets
          items:
            type: object
        nickname:
          type: array
          description: Alternative names/nicknames for the asset
          items:
            type: string
        id_tag:
          type: array
          description: Physical identification tags
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
              location:
                type: string
        image:
          type: array
          description: Attached images
          items:
            type: object
        file:
          type: array
          description: Attached files
          items:
            type: object
        created:
          type: integer
          description: Unix timestamp when the record was created
          readOnly: true
        changed:
          type: integer
          description: Unix timestamp when the record was last modified
          readOnly: true
  parameters:
    FilterField:
      name: filter[field]
      in: query
      description: 'JSON:API filter parameter. Use dot notation for nested fields.

        Example: filter[status]=pending or filter[timestamp][value]=1234567890&filter[timestamp][operator]=>=

        '
      schema:
        type: string
    PageSize:
      name: page[limit]
      in: query
      description: Number of results per page
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 50
    IncludeRelated:
      name: include
      in: query
      description: 'Comma-separated list of related resources to include in the response.

        Example: include=asset,quantity

        '
      schema:
        type: string
    SortField:
      name: sort
      in: query
      description: 'Comma-separated list of fields to sort by. Prefix with - for descending.

        Example: sort=-timestamp,name

        '
      schema:
        type: string
    PageOffset:
      name: page[offset]
      in: query
      description: Offset for pagination
      schema:
        type: integer
        minimum: 0
        default: 0
    ResourceId:
      name: id
      in: path
      required: true
      description: UUID of the resource
      schema:
        type: string
        format: uuid
      example: 3f1c2b4a-5d6e-7890-abcd-ef1234567890
  responses:
    NotFound:
      description: Resource not found
      content:
        application/vnd.api+json:
          schema:
            $ref: '#/components/schemas/JsonApiError'
    UnprocessableEntity:
      description: Validation error
      content:
        application/vnd.api+json:
          schema:
            $ref: '#/components/schemas/JsonApiError'
    Unauthorized:
      description: Authentication required or token expired
      content:
        application/vnd.api+json:
          schema:
            $ref: '#/components/schemas/JsonApiError'
  securitySchemes:
    oauth2AuthorizationCode:
      type: oauth2
      description: 'OAuth2 Authorization Code grant for third-party integrations. Users

        authorize the client application to access their farmOS data.

        '
      flows:
        authorizationCode:
          authorizationUrl: /oauth/authorize
          tokenUrl: /oauth/token
          scopes:
            farm_manager: Full management access to the farm
            farm_worker: Worker-level access to farm records
            farm_viewer: Read-only access to farm records
    oauth2ClientCredentials:
      type: oauth2
      description: 'OAuth2 Client Credentials grant for machine-to-machine authentication.

        Used when no user account is required.

        '
      flows:
        clientCredentials:
          tokenUrl: /oauth/token
          scopes:
            farm_manager: Full management access to the farm
            farm_worker: Worker-level access to farm records
            farm_viewer: Read-only access to farm records
externalDocs:
  description: farmOS API Documentation
  url: https://farmos.org/development/api/
